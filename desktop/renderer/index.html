<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Builder Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="workspace">
      <aside id="asset-sidebar" class="sidebar">
        <div class="media-library">
          <section class="asset-section">
            <h2>Images <span id="image-count">0</span></h2>
            <div id="image-assets" class="asset-list" data-empty-label="No images found"></div>
          </section>

          <section class="asset-section">
            <h2>Videos <span id="video-count">0</span></h2>
            <div id="video-assets" class="asset-list" data-empty-label="No videos found"></div>
          </section>

          <section class="asset-section">
            <h2>PDFs <span id="pdf-count">0</span></h2>
            <div id="pdf-assets" class="asset-list" data-empty-label="No PDFs found"></div>
          </section>
        </div>

        <section class="browser-section">
          <h2>Internet</h2>
          <button class="asset-card browser-card" draggable="true" data-kind="browser" data-title="Internet Card">
            Browser
          </button>
          <p>Drop this into the canvas for a real Electron webview browser.</p>
        </section>
      </aside>

      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        type="button"
        aria-controls="asset-sidebar"
        aria-expanded="true"
        aria-label="Hide sidebar"
        title="Hide sidebar"
      >
        &#8249;
      </button>

      <main id="canvas" class="canvas">
        <div class="empty-state">
          <strong>Drop cards here</strong>
          <span>Use the internet card to browse directly inside the canvas.</span>
        </div>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
