name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/windows-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        run: npm ci

      - name: Build Windows portable EXE
        run: npm run dist:win

      - name: Assemble downloadable gallery
        shell: pwsh
        run: |
          $release = "release"
          New-Item -ItemType Directory -Force "$release/images", "$release/videos", "$release/pdf" | Out-Null
          $exe = Get-ChildItem "dist/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "$release/Gallery-Builder.exe"
          Set-Content "$release/images/README.txt" "Place image files here: jpg, jpeg, png, webp, gif, svg."
          Set-Content "$release/videos/README.txt" "Place video files here: mp4, webm, mov."
          Set-Content "$release/pdf/README.txt" "Place PDF files here."

      - name: Upload gallery ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-builder-windows
          path: desktop/release/*
